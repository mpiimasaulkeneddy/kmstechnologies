<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | KMS Technologies UG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0ea5e9; 
            --secondary: #6366f1;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f9fafb;
            --whatsapp: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 1200px; background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(15px); border: 1px solid var(--border);
            border-radius: 100px; display: flex; justify-content: space-between;
            align-items: center; padding: 8px 20px; z-index: 1000;
        }
        .logo-text { font-weight: 800; font-size: 1.2rem; color: var(--primary); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 0.85rem; opacity: 0.7; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: var(--primary); }
        .logo-wrapper {
            width: 45px; height: 45px; border-radius: 50%; overflow: hidden;
            border: 2px solid var(--primary); background: white;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-wrapper img { width: 140%; transform: translateY(-5%); }

        /* --- CONTACT HERO --- */
        .contact-hero {
            padding: 160px 20px 60px; text-align: center;
            background: radial-gradient(circle at top, #1e1b4b 0%, #030712 100%);
        }

        .contact-container {
            max-width: 1200px; margin: 0 auto; padding: 40px 20px 100px;
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px;
        }

        /* --- INFO TILES --- */
        .info-panel { display: flex; flex-direction: column; gap: 20px; }
        .info-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 30px; border-radius: 24px; transition: 0.3s;
        }
        .info-card:hover { border-color: var(--primary); transform: translateX(10px); }
        .info-card i { font-size: 1.5rem; color: var(--primary); margin-bottom: 15px; display: block; }
        .info-card h4 { margin-bottom: 5px; font-size: 1.1rem; }
        .info-card p { color: #94a3b8; font-size: 0.9rem; }

        /* --- FORM --- */
        .form-card {
            background: rgba(17, 24, 39, 0.4); border: 1px solid var(--border);
            padding: 40px; border-radius: 30px; backdrop-filter: blur(10px);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #94a3b8; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 12px; color: white;
            outline: none; transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); }
        
        .submit-btn {
            width: 100%; padding: 15px; background: var(--whatsapp); color: white;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
            transition: 0.3s; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .submit-btn:hover { background: #1eb954; transform: translateY(-2px); }

        /* --- WHATSAPP FLOATING BUTTON --- */
        .whatsapp-btn {
            position: fixed; bottom: 30px; right: 30px;
            background-color: var(--whatsapp); color: white;
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; text-decoration: none;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
            z-index: 2000; transition: 0.3s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        @media (max-width: 900px) {
            .contact-container { grid-template-columns: 1fr; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <a href="https://wa.me/256703872026" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <nav>
        <a href="index.html" class="logo-text">KMS <span style="color:white">TECH</span></a>
        <ul class="nav-links">
            <li><a href="index.html">index</a></li>
            <li><a href="About Us.html">About Us</a></li>
            <li><a href="Services.html">Services</a></li>
            <li><a href="Projects.html">Projects</a></li>
            <li><a href="Contact us.html" style="color: var(--primary); opacity: 1;">Contact</a></li>
        </ul>
        <div class="logo-wrapper"><img src="images/logo.png" alt="KMS Logo"></div>
    </nav>

    <header class="contact-hero">
        <h1 style="font-size: 3rem; font-weight: 800;">Get in Touch</h1>
        <p style="color: #94a3b8;">Fill the form below to chat with us instantly on WhatsApp.</p>
    </header>

    <main class="contact-container">
        <div class="info-panel">
            <div class="info-card">
                <i class="fas fa-phone-volume"></i>
                <h4>Call Support</h4>
                <p>+256 703 872026</p>
            </div>
            <div class="info-card" style="background: rgba(37, 211, 102, 0.1); border-color: var(--whatsapp);">
                <i class="fab fa-whatsapp" style="color: var(--whatsapp);"></i>
                <h4>Instant Chat</h4>
                <p>0703872026</p>
            </div>
        </div>

        <div class="form-card">
            <form onsubmit="sendToWhatsapp(event)">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="userName" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email (Optional)</label>
                        <input type="email" id="userEmail" placeholder="john@company.com">
                    </div>
                </div>
                <div class="form-group">
                    <label>Service Interested In</label>
                    <input type="text" id="userService" placeholder="e.g. CCTV Installation">
                </div>
                <div class="form-group">
                    <label>Your Message</label>
                    <textarea id="userMessage" rows="5" required placeholder="Tell us about your project..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fab fa-whatsapp"></i> Send to WhatsApp
                </button>
            </form>
        </div>
    </main>

    <script>
        function sendToWhatsapp(event) {
            event.preventDefault(); // Prevents page reload

            // Get values from inputs
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value || "Not provided";
            const service = document.getElementById('userService').value || "General Inquiry";
            const message = document.getElementById('userMessage').value;

            // Your WhatsApp Number
            const phoneNumber = "256703872026";

            // Format the message for WhatsApp
            const text = `*New Discovery Message - KMS TECH*%0A%0A` +
                         `*Name:* ${name}%0A` +
                         `*Email:* ${email}%0A` +
                         `*Service:* ${service}%0A%0A` +
                         `*Message:* ${message}`;

            // Create the WhatsApp link
            const whatsappURL = `https://wa.me/${phoneNumber}?text=${text}`;

            // Open the link in a new tab
            window.open(whatsappURL, '_blank').focus();
        }
    </script>

    <footer style="text-align: center; padding: 40px; color: #4b5563; border-top: 1px solid var(--border);">
        <p>© 2026 KMS Technologies UG. Professional ICT Partners.</p>
    </footer>

</body>
</html>
